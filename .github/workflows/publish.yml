name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
        # no registry-url: it injects a placeholder auth token that breaks OIDC

      - name: Ensure npm supports Trusted Publishing (>= 11.5.1)
        # npm@11 runs on any Node 22.x; npm@latest (v12) needs Node >= 22.22.2 and
        # would silently leave the old bundled npm 10.x if the runner's Node is lower
        run: |
          npm install -g npm@11
          echo "npm version: $(npm --version)"

      - name: Assert OIDC prerequisites
        run: |
          echo "which npm : $(which npm)"
          echo "npm       : $(npm --version)"
          node -e "const v=require('child_process').execSync('npm --version').toString().trim().split('.').map(Number); if(v[0]<11||(v[0]===11&&v[1]<5)){console.error('npm too old for OIDC:',v.join('.'));process.exit(1)}"
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "id-token  : available ✅"
          else
            echo "id-token  : MISSING ❌ (id-token: write not effective)"
            exit 1
          fi

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish
        run: npm publish
