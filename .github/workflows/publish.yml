name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
        # no registry-url: it injects a placeholder auth token that breaks OIDC

      - name: Upgrade npm (Trusted Publishing needs >= 11.5.1)
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"   # must be >= 11.5.1 for OIDC

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish
        run: npm publish
